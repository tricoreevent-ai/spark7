    <text x="138" y="556" fill="#96C9FF" font-family="Arial, sans-serif" font-size="18" font-weight="700">₹944.00</text>
    <text x="282" y="556" fill="#96C9FF" font-family="Arial, sans-serif" font-size="18" font-weight="700">0</text>
    <text x="396" y="556" fill="#96C9FF" font-family="Arial, sans-serif" font-size="18" font-weight="700">0</text>
    <text x="510" y="556" fill="#96C9FF" font-family="Arial, sans-serif" font-size="18" font-weight="700">0</text>
    <text x="624" y="556" fill="#89FFC8" font-family="Arial, sans-serif" font-size="18" font-weight="700">₹1,644.00</text>
    <text x="760" y="556" fill="#96C9FF" font-family="Arial, sans-serif" font-size="18" font-weight="700">0</text>

