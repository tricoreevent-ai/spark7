<svg width="1500" height="840" viewBox="0 0 1500 840" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1500" height="840" rx="38" fill="#090C18"/>
  <rect x="18" y="18" width="1464" height="804" rx="32" fill="url(#pageBg)"/>

  <text x="56" y="92" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="54" font-weight="700">Sales Dashboard</text>
