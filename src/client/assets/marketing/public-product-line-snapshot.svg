      <stop offset="1" stop-color="#11172B"/>
    </linearGradient>
    <linearGradient id="stockPanel" x1="916" y1="340" x2="1444" y2="770" gradientUnits="userSpaceOnUse">
      <stop stop-color="#21263C"/>
      <stop offset="1" stop-color="#2B1D39"/>
    </linearGradient>
    <linearGradient id="barBlue" x1="118" y1="644" x2="182" y2="714" gradientUnits="userSpaceOnUse">
      <stop stop-color="#79D0FF"/>
      <stop offset="1" stop-color="#3C73F1"/>
